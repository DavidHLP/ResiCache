name: 'Setup JDK 21 (ResiCache)'

description: >-
  Composite action that sets up JDK + Maven cache for ResiCache
  CI. Java version defaults to '21' to match pom.xml
  <java.version>21</java.version> (WS-1.1 FIRE commit 38c514a).
  All ResiCache workflows that need a JDK should call this
  composite instead of inlining `setup-java@v5` — single source
  of truth for JDK version + distribution + cache config.

  Optional inputs (server-id, server-username, server-password,
  gpg-private-key, gpg-passphrase) are pass-through for the
  release workflow's Maven Central deployment needs. They are
  not configured by default — only release.yml passes them.

inputs:
  java-version:
    description: 'JDK version (must match pom.xml <java.version>)'
    required: false
    default: '21'
  distribution:
    description: 'JDK distribution'
    required: false
    default: 'temurin'
  cache:
    description: 'Actions dependency cache (maven, gradle, or empty)'
    required: false
    default: 'maven'
  server-id:
    description: 'Maven settings.xml server id (release deploy only)'
    required: false
    default: ''
  server-username:
    description: 'Maven settings.xml server username (release only)'
    required: false
    default: ''
  server-password:
    description: 'Maven settings.xml server password (release only)'
    required: false
    default: ''
  gpg-private-key:
    description: 'GPG signing private key (release deploy only)'
    required: false
    default: ''
  gpg-passphrase:
    description: 'GPG signing passphrase (release deploy only)'
    required: false
    default: 'GPG_PASSPHRASE'

runs:
  using: composite
  steps:
    - name: Setup JDK ${{ inputs.java-version }}
      uses: actions/setup-java@v5
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.distribution }}
        cache: ${{ inputs.cache }}
        # Deploy-secret optional inputs are only forwarded when
        # non-empty so non-release callers don't accidentally
        # reference missing secrets in env: settings.
        server-id: ${{ inputs.server-id }}
        server-username: ${{ inputs.server-username }}
        server-password: ${{ inputs.server-password }}
        gpg-private-key: ${{ inputs.gpg-private-key }}
        gpg-passphrase: ${{ inputs.gpg-passphrase }}

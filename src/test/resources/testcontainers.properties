# Enable container reuse across test runs
# This allows Testcontainers to reuse containers between test executions,
# significantly reducing startup time for subsequent test runs.
testcontainers.reuse.enable=true

# Docker API version override (required for Docker 23+ / API 1.40+)
# The docker-java library defaults to API version 1.32, which is too old
DOCKER_API_VERSION=1.54

# Testcontainers Configuration
#
# Container reuse is disabled to ensure each test run uses fresh containers.
# This provides better test isolation and reproducibility.

# Disable container reuse - each test run uses fresh containers
# (Default is false, but we explicitly set it for clarity)
testcontainers.reuse.enable=false

# Docker API version override (required for Docker 23+ / API 1.40+)
# The docker-java library defaults to API version 1.32, which is too old
DOCKER_API_VERSION=1.54
spring:
  data:
    redis:
      host: localhost
      port: 6379
      password: ""
      database: 0

resi-cache:
  default-ttl: 30m
  bloom-filter:
    enabled: false
  early-expiration:
    enabled: false
  sync-lock:
    enabled: false
  disabled-handlers:
    - bloom-filter
    - early-expiration
    - sync-lock
